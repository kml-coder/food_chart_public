services:
  backend:
    image: ghcr.io/${GHCR_OWNER}/${IMAGE_PREFIX}-backend:latest
    container_name: food-chart-backend
    ports:
      - "5050:5050"
    volumes:
      - ./food_server/model:/app/model:ro
    restart: unless-stopped

  frontend:
    image: ghcr.io/${GHCR_OWNER}/${IMAGE_PREFIX}-frontend:latest
    container_name: food-chart-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
